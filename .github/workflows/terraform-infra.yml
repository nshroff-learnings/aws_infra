name: Terraform Infrastructure

on:
  pull_request:
    paths:
      - "infra/**"
      - "variables/**"
      - ".github/workflows/terraform-infra.yml"
      - ".github/workflows/terraform-layer.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "variables/**"
      - ".github/workflows/terraform-infra.yml"
      - ".github/workflows/terraform-layer.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - qa
      action:
        description: "Run plan, plan plus apply, or destroy"
        type: choice
        required: true
        default: plan
        options:
          - plan
          - apply
          - destroy
      layers:
        description: "Layer to run"
        type: choice
        required: true
        default: all
        options:
          - all
          - networking
          - iam
          - config
          - compute
          - bootstrap

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  networking:
    name: Networking
    if: ${{ github.event_name != 'workflow_dispatch' || (inputs.action != 'destroy' && (inputs.layers == 'all' || inputs.layers == 'networking')) }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: networking
      var_file: networking.tfvars
      target_environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      operation: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}

  iam:
    name: IAM
    needs: networking
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || (inputs.action != 'destroy' && (inputs.layers == 'all' || inputs.layers == 'iam'))) && (github.event_name != 'workflow_dispatch' || inputs.layers != 'all' || inputs.action != 'apply' || needs.networking.result == 'success') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: iam
      var_file: iam.tfvars
      target_environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      operation: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}

  config:
    name: Config
    needs: iam
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || (inputs.action != 'destroy' && (inputs.layers == 'all' || inputs.layers == 'config'))) && (github.event_name != 'workflow_dispatch' || inputs.layers != 'all' || inputs.action != 'apply' || needs.iam.result == 'success') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: config
      var_file: config.tfvars
      target_environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      operation: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}

  compute:
    name: Compute
    needs: config
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || (inputs.action != 'destroy' && (inputs.layers == 'all' || inputs.layers == 'compute'))) && (github.event_name != 'workflow_dispatch' || inputs.layers != 'all' || inputs.action != 'apply' || needs.config.result == 'success') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: compute
      var_file: eks.tfvars
      target_environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      operation: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}

  bootstrap:
    name: Bootstrap
    needs: compute
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || (inputs.action != 'destroy' && (inputs.layers == 'all' || inputs.layers == 'bootstrap'))) && (github.event_name != 'workflow_dispatch' || inputs.layers != 'all' || inputs.action != 'apply' || needs.compute.result == 'success') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: bootstrap
      var_file: bootstrap.tfvars
      target_environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      operation: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}

  bootstrap_destroy:
    name: Bootstrap Destroy
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && (inputs.layers == 'all' || inputs.layers == 'bootstrap') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: bootstrap
      var_file: bootstrap.tfvars
      target_environment: ${{ inputs.environment }}
      operation: destroy

  compute_destroy:
    name: Compute Destroy
    needs: bootstrap_destroy
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && (inputs.layers == 'all' || inputs.layers == 'compute') && (inputs.layers != 'all' || needs.bootstrap_destroy.result == 'success') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: compute
      var_file: eks.tfvars
      target_environment: ${{ inputs.environment }}
      operation: destroy

  config_destroy:
    name: Config Destroy
    needs: compute_destroy
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && (inputs.layers == 'all' || inputs.layers == 'config') && (inputs.layers != 'all' || needs.compute_destroy.result == 'success') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: config
      var_file: config.tfvars
      target_environment: ${{ inputs.environment }}
      operation: destroy

  iam_destroy:
    name: IAM Destroy
    needs: config_destroy
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && (inputs.layers == 'all' || inputs.layers == 'iam') && (inputs.layers != 'all' || needs.config_destroy.result == 'success') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: iam
      var_file: iam.tfvars
      target_environment: ${{ inputs.environment }}
      operation: destroy

  networking_destroy:
    name: Networking Destroy
    needs: iam_destroy
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && (inputs.layers == 'all' || inputs.layers == 'networking') && (inputs.layers != 'all' || needs.iam_destroy.result == 'success') }}
    uses: ./.github/workflows/terraform-layer.yml
    with:
      layer: networking
      var_file: networking.tfvars
      target_environment: ${{ inputs.environment }}
      operation: destroy
